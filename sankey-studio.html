<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sankey Studio</title>

<!-- D3 core + d3-sankey plugin (the layout algorithm) -->
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f4efe6;
    --ink: #1a1a1a;
    --ink-soft: #5a5550;
    --rule: #d9d0bf;
    --accent: #a4243b;
    --panel: #ebe4d3;
    --serif: "Instrument Serif", Georgia, serif;
    --mono: "JetBrains Mono", "SF Mono", Consolas, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
    /* subtle paper grain */
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.015) 1px, transparent 1px),
      radial-gradient(circle at 70% 70%, rgba(0,0,0,0.015) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
  }

  .app {
    display: grid;
    grid-template-columns: 380px 1fr;
    height: 100vh;
  }

  /* ───────── SIDEBAR ───────── */
  aside {
    border-right: 1px solid var(--rule);
    padding: 28px 24px;
    overflow-y: auto;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .brand {
    border-bottom: 1px solid var(--rule);
    padding-bottom: 16px;
  }

  .brand h1 {
    font-family: var(--serif);
    font-size: 38px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .brand .sub {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  .syntax {
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 10px 12px;
    font-size: 12px;
  }

  .syntax code {
    color: var(--accent);
  }

  textarea {
    width: 100%;
    height: 320px;
    padding: 14px;
    background: var(--bg);
    border: 1px solid var(--rule);
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  .controls {
    display: flex;
    gap: 8px;
  }

  .presets {
    display: flex;
    gap: 6px;
  }

  .preset-pill {
    flex: 1;
    padding: 8px 12px;
    background: var(--bg);
    color: var(--ink-soft);
    border: 1px solid var(--rule);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    cursor: pointer;
    transition: all 0.15s;
  }

  .preset-pill:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  .preset-pill.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  button {
    flex: 1;
    padding: 10px 14px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: background 0.15s;
  }

  button:hover {
    background: var(--accent);
  }

  button.ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--rule);
  }

  button.ghost:hover {
    background: var(--ink);
    color: var(--bg);
  }

  .stats {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    font-size: 11px;
    color: var(--ink-soft);
  }

  .stats span strong {
    color: var(--ink);
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 400;
    margin-right: 4px;
  }

  .err {
    color: var(--accent);
    font-size: 11px;
    min-height: 14px;
  }

  /* ───────── SAVED LIST ───────── */
  .saved-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 180px;
    overflow-y: auto;
  }

  .saved-empty {
    font-size: 11px;
    color: var(--ink-soft);
    font-style: italic;
    padding: 8px 0;
  }

  .saved-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 6px;
    align-items: center;
    padding: 6px 10px;
    background: var(--bg);
    border: 1px solid var(--rule);
    font-size: 11.5px;
    transition: border-color 0.15s;
  }

  .saved-item:hover {
    border-color: var(--ink);
  }

  .saved-item .name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .saved-item button {
    flex: none;
    padding: 3px 8px;
    font-size: 9px;
    letter-spacing: 0.1em;
    background: transparent;
    color: var(--ink-soft);
    border: none;
  }

  .saved-item button:hover {
    color: var(--ink);
    background: transparent;
  }

  .saved-item button.del:hover {
    color: var(--accent);
  }

  .save-status {
    font-size: 10px;
    color: var(--ink-soft);
    text-align: right;
    font-style: italic;
    min-height: 12px;
    transition: opacity 0.3s;
  }

  /* ───────── CANVAS ───────── */
  main {
    position: relative;
    overflow: hidden;
  }

  .canvas-header {
    position: absolute;
    top: 20px;
    left: 28px;
    right: 28px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    pointer-events: none;
    z-index: 2;
  }

  .canvas-header .title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
  }

  .canvas-header .meta {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
  }

  #diagram {
    width: 100%;
    height: 100%;
    display: block;
  }

  #diagram text {
    font-family: var(--mono);
    font-size: 11px;
    fill: var(--ink);
    pointer-events: none;
  }

  #diagram .node-rect {
    cursor: pointer;
    transition: opacity 0.15s;
  }

  #diagram .node-rect:hover {
    opacity: 0.75;
  }

  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="app">
  <aside>
    <div class="brand">
      <h1>Sankey Studio</h1>
      <div class="sub">flow diagrams · v1</div>
    </div>

    <div>
      <div class="section-label">Syntax</div>
      <div class="syntax">
        <code>Source [value] Target</code><br>
        <span style="color: var(--ink-soft); font-size: 11px;">// comments allowed</span>
      </div>
    </div>

    <div>
      <div class="section-label">Preset</div>
      <div class="presets">
        <button class="preset-pill active" data-preset="budget">Budget</button>
        <button class="preset-pill" data-preset="applications">Applications</button>
      </div>
    </div>

    <div>
      <div class="section-label">Input</div>
      <textarea id="input" spellcheck="false"></textarea>
    </div>

    <div class="err" id="err"></div>

    <div class="stats">
      <span><strong id="stat-nodes">0</strong>nodes</span>
      <span><strong id="stat-links">0</strong>links</span>
      <span><strong id="stat-total">0</strong>total flow</span>
    </div>

    <div>
      <div class="section-label">Saved diagrams</div>
      <div class="saved-list" id="saved-list"></div>
      <div class="save-status" id="save-status"></div>
    </div>

    <div class="controls">
      <button id="save-named">Save as...</button>
      <button id="download-svg" class="ghost">SVG</button>
      <button id="download-txt" class="ghost">.txt</button>
    </div>
  </aside>

  <main>
    <div class="canvas-header">
      <div class="title">Diagram</div>
      <div class="meta" id="dim-info">— × —</div>
    </div>
    <div class="empty" id="empty">type something to begin</div>
    <svg id="diagram"></svg>
  </main>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════
   SANKEY STUDIO — three logical pieces:
     1. parse()   — text  → { nodes, links }
     2. layout    — d3.sankey() computes geometry
     3. render()  — D3 data-binds rectangles, paths, labels to SVG

   Read the comments. Mess with the constants. Break it on purpose.
   ════════════════════════════════════════════════════════════════════ */

// Editorial palette — warm earth tones. Override via this array.
const PALETTE = [
  '#a4243b', '#588b8b', '#d8973c', '#2e4057',
  '#8b5a3c', '#5d737e', '#bc4b51', '#88a09e'
];
const color = d3.scaleOrdinal(PALETTE);

// Built-in presets. Add your own — just extend this object and add
// a matching <button data-preset="..."> in the HTML.
const PRESETS = {
  budget: `// Personal budget — monthly flow
Salary [3000] Take-home
Salary [800] Taxes

Take-home [1200] Living
Take-home [600] Savings
Take-home [800] Discretionary
Take-home [400] Investments

Living [700] Rent
Living [300] Groceries
Living [200] Utilities

Discretionary [350] Eating out
Discretionary [250] Hobbies
Discretionary [200] Travel fund`,

  applications: `// Job application funnel
Applications [60] No response
Applications [40] Response

Response [25] Rejected (screening)
Response [15] Phone screen

Phone screen [8] Rejected (phone)
Phone screen [7] Technical interview

Technical interview [4] Rejected (technical)
Technical interview [3] Final round

Final round [2] Rejected (final)
Final round [1] Offer`
};

// ────────── 1. PARSER ──────────
// Each non-empty, non-comment line should match: "Source [value] Target"
// Returns { nodes: [...unique], links: [...] } or throws on first bad line.
function parse(text) {
  const re = /^\s*(.+?)\s*\[\s*([\d.]+)\s*\]\s*(.+?)\s*$/;
  const nodeMap = new Map();   // name → node object (preserves insertion order)
  const links = [];
  const errors = [];

  text.split('\n').forEach((line, i) => {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('//')) return;

    const m = trimmed.match(re);
    if (!m) {
      errors.push(`Line ${i + 1}: unparseable`);
      return;
    }

    const [, source, valStr, target] = m;
    const value = +valStr;
    if (value <= 0) {
      errors.push(`Line ${i + 1}: value must be > 0`);
      return;
    }

    if (!nodeMap.has(source)) nodeMap.set(source, { name: source });
    if (!nodeMap.has(target)) nodeMap.set(target, { name: target });
    links.push({ source, target, value });
  });

  return { nodes: [...nodeMap.values()], links, errors };
}

// ────────── 2 + 3. LAYOUT + RENDER ──────────
const svg = d3.select('#diagram');
const errBox = document.getElementById('err');
const empty = document.getElementById('empty');

function render() {
  const text = inputEl.value;
  const { nodes, links, errors } = parse(text);

  // Update stats + error display
  document.getElementById('stat-nodes').textContent = nodes.length;
  document.getElementById('stat-links').textContent = links.length;
  document.getElementById('stat-total').textContent =
    links.reduce((s, l) => s + l.value, 0).toFixed(0);
  errBox.textContent = errors.length ? errors[0] : '';

  svg.selectAll('*').remove();

  if (nodes.length === 0 || links.length === 0) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  // Get available canvas size
  const { width, height } = svg.node().getBoundingClientRect();
  document.getElementById('dim-info').textContent =
    `${width.toFixed(0)} × ${height.toFixed(0)}`;

  // d3-sankey layout — this is the algorithm doing the heavy lifting.
  // It assigns each node an (x0, x1, y0, y1) box and each link a `width`
  // proportional to its value.
  const sankey = d3.sankey()
    .nodeId(d => d.name)
    .nodeWidth(14)
    .nodePadding(16)
    .extent([[80, 60], [width - 140, height - 40]]);

  // Note: d3-sankey MUTATES its input — we deep-copy to keep our parsed
  // data clean across re-renders.
  let graph;
  try {
    graph = sankey({
      nodes: nodes.map(d => ({ ...d })),
      links: links.map(d => ({ ...d }))
    });
  } catch (e) {
    errBox.textContent = `Layout error: ${e.message} (cycle in graph?)`;
    return;
  }

  // ── LINKS (paths) ──
  // d3.sankeyLinkHorizontal() returns a path generator. Stroke width
  // encodes value; that's the whole "Sankey" insight.
  svg.append('g')
    .attr('fill', 'none')
    .selectAll('path')
    .data(graph.links)
    .join('path')
    .attr('d', d3.sankeyLinkHorizontal())
    .attr('stroke', d => color(d.source.name))
    .attr('stroke-opacity', 0.45)
    .attr('stroke-width', d => Math.max(1, d.width))
    .style('mix-blend-mode', 'multiply')   // overlapping bands blend nicely
    .append('title')
    .text(d => `${d.source.name} → ${d.target.name}\n${d.value}`);

  // ── NODES (rectangles + labels) ──
  const node = svg.append('g')
    .selectAll('g')
    .data(graph.nodes)
    .join('g');

  node.append('rect')
    .attr('class', 'node-rect')
    .attr('x', d => d.x0)
    .attr('y', d => d.y0)
    .attr('height', d => Math.max(1, d.y1 - d.y0))
    .attr('width', d => d.x1 - d.x0)
    .attr('fill', d => color(d.name))
    .append('title')
    .text(d => `${d.name}\n${d.value}`);

  node.append('text')
    .attr('x', d => d.x0 < width / 2 ? d.x1 + 8 : d.x0 - 8)
    .attr('y', d => (d.y0 + d.y1) / 2)
    .attr('dy', '0.35em')
    .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
    .text(d => `${d.name} · ${d.value}`);
}

// ────────── DOWNLOAD HELPERS ──────────
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('download-svg').addEventListener('click', () => {
  const svgEl = document.getElementById('diagram');
  // Inline a white background for the exported file
  const clone = svgEl.cloneNode(true);
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('width', '100%');
  bg.setAttribute('height', '100%');
  bg.setAttribute('fill', '#f4efe6');
  clone.insertBefore(bg, clone.firstChild);
  const xml = new XMLSerializer().serializeToString(clone);
  downloadBlob(new Blob([xml], { type: 'image/svg+xml' }), 'sankey.svg');
});

document.getElementById('download-txt').addEventListener('click', () => {
  downloadBlob(
    new Blob([inputEl.value], { type: 'text/plain' }),
    'sankey-source.txt'
  );
});

// ════════════════════════════════════════════════════════════════════
// PERSISTENT STORAGE
//
// We use localStorage — synchronous, ~5MB, persists per origin (or per
// file:// path for local files). Single key, JSON-encoded blob:
//   {
//     draft: "current textarea content",
//     saves: { "name1": "content1", "name2": "content2" }
//   }
//
// Key things to notice:
//   - try/catch everywhere: storage can be disabled (private browsing)
//     or full (quota exceeded).
//   - draft saves are debounced — we don't write on every keystroke.
//   - named saves are explicit (user clicks "Save as...").
// ════════════════════════════════════════════════════════════════════

const STORAGE_KEY = 'sankey-studio:v1';

function loadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { draft: '', saves: {} };
    const parsed = JSON.parse(raw);
    // Defensive: ensure shape, even if storage was tampered with.
    return {
      draft: parsed.draft || '',
      saves: parsed.saves || {}
    };
  } catch (e) {
    console.warn('Storage corrupted, resetting:', e);
    return { draft: '', saves: {} };
  }
}

function writeStorage(s) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
    return true;
  } catch (e) {
    // Most likely: storage disabled or quota exceeded.
    showStatus('storage unavailable');
    console.warn('Save failed:', e);
    return false;
  }
}

const state = loadStorage();

const statusEl = document.getElementById('save-status');
let statusTimer;
function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.style.opacity = '1';
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { statusEl.style.opacity = '0'; }, 1800);
}

// Debounced draft save — fires 400ms after the last keystroke.
// This is a classic pattern: don't do expensive work on every input event.
let draftTimer;
function scheduleDraftSave() {
  clearTimeout(draftTimer);
  draftTimer = setTimeout(() => {
    state.draft = inputEl.value;
    writeStorage(state);
  }, 400);
}

// ────────── NAMED SAVES UI ──────────
const savedListEl = document.getElementById('saved-list');

function renderSavedList() {
  const names = Object.keys(state.saves).sort();
  savedListEl.innerHTML = '';

  if (names.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'saved-empty';
    empty.textContent = 'no saves yet — click "Save as..."';
    savedListEl.appendChild(empty);
    return;
  }

  for (const name of names) {
    const row = document.createElement('div');
    row.className = 'saved-item';
    row.innerHTML = `
      <span class="name" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
      <button data-action="load">Load</button>
      <button data-action="del" class="del">×</button>
    `;
    row.querySelector('[data-action="load"]').addEventListener('click', () => {
      inputEl.value = state.saves[name];
      state.draft = state.saves[name];
      writeStorage(state);
      // Loading a save means we're no longer on a preset.
      document.querySelectorAll('.preset-pill').forEach(b =>
        b.classList.remove('active')
      );
      render();
      showStatus(`loaded "${name}"`);
    });
    row.querySelector('[data-action="del"]').addEventListener('click', () => {
      if (!confirm(`Delete "${name}"?`)) return;
      delete state.saves[name];
      writeStorage(state);
      renderSavedList();
      showStatus(`deleted "${name}"`);
    });
    savedListEl.appendChild(row);
  }
}

// Avoid HTML injection in user-provided save names.
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

document.getElementById('save-named').addEventListener('click', () => {
  const name = prompt('Name this diagram:');
  if (!name || !name.trim()) return;
  const trimmed = name.trim();
  if (state.saves[trimmed]) {
    if (!confirm(`"${trimmed}" already exists. Overwrite?`)) return;
  }
  state.saves[trimmed] = inputEl.value;
  if (writeStorage(state)) {
    renderSavedList();
    showStatus(`saved "${trimmed}"`);
  }
});
// ────────── BOOT ──────────
const inputEl = document.getElementById('input');

// Priority: restored draft > default preset.
// If user typed something previously, respect that. Otherwise show budget.
if (state.draft && state.draft.trim()) {
  inputEl.value = state.draft;
  // No preset pill is "active" — we're on a custom draft.
  document.querySelectorAll('.preset-pill').forEach(b => b.classList.remove('active'));
} else {
  inputEl.value = PRESETS.budget;
}

// Two things on every keystroke: re-render + schedule a draft save.
inputEl.addEventListener('input', () => {
  render();
  scheduleDraftSave();
});
window.addEventListener('resize', render);

// Wire preset pills — clicking loads that template into the textarea.
// The draft auto-save then captures the new content.
document.querySelectorAll('.preset-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    const name = btn.dataset.preset;
    if (!PRESETS[name]) return;
    inputEl.value = PRESETS[name];
    document.querySelectorAll('.preset-pill').forEach(b =>
      b.classList.toggle('active', b === btn)
    );
    state.draft = PRESETS[name];
    writeStorage(state);
    render();
  });
});

renderSavedList();
render();
</script>
</body>
</html>
