<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sankey Studio</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <aside>
    <div class="brand">
      <h1>Sankey Studio</h1>
      <div class="sub">flow diagrams · v1</div>
    </div>

    <div>
      <div class="section-label">Syntax</div>
      <div class="syntax">
        <code>Source [value] Target</code><br>
        <span style="color: var(--ink-soft); font-size: 11px;">// comments allowed</span>
      </div>
    </div>

    <div>
      <div class="section-label">Preset</div>
      <div class="presets">
        <button class="preset-pill active" data-preset="budget">Budget</button>
        <button class="preset-pill" data-preset="applications">Applications</button>
      </div>
    </div>

    <div>
      <div class="section-label">Input</div>
      <textarea id="input" spellcheck="false"></textarea>
    </div>

    <div class="err" id="err"></div>

    <div class="stats">
      <span><strong id="stat-nodes">0</strong>nodes</span>
      <span><strong id="stat-links">0</strong>links</span>
      <span><strong id="stat-total">0</strong>total flow</span>
    </div>

    <div>
      <div class="section-label">Saved diagrams</div>
      <div class="saved-list" id="saved-list"></div>
      <div class="save-status" id="save-status"></div>
    </div>

    <div class="controls">
      <button id="save-named">Save as...</button>
      <button id="download-svg" class="ghost">SVG</button>
      <button id="download-txt" class="ghost">.txt</button>
    </div>
  </aside>

  <main>
    <div class="canvas-header">
      <div class="title">Diagram</div>
      <div class="meta" id="dim-info">— × —</div>
    </div>
    <div class="empty" id="empty">type something to begin</div>
    <svg id="diagram"></svg>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/parser.js"></script>
<script src="js/storage.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>
</body>
</html>
